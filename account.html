<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Settings | CodeVector</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    
    .profile-ripple {
      animation: ripple 2s infinite;
    }
    @keyframes ripple {
      0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); }
      70% { box-shadow: 0 0 0 15px rgba(34, 211, 238, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); }
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-200">

<nav class="bg-slate-900/90 backdrop-blur-md border-b border-slate-800 sticky top-0 z-50 px-6 py-4">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <a href="index.html" class="flex items-center space-x-3 hover:opacity-90 transition">
      <img src="Code Vector.png" alt="CodeVector Logo" class="h-10 w-10 rounded shadow-lg shadow-cyan-500/20">
      <span class="text-2xl font-extrabold tracking-tight text-white">Code<span class="text-cyan-400">Vector</span></span>
    </a>

    <div class="hidden lg:flex items-center space-x-10">
      <ul class="flex space-x-8 text-sm font-semibold tracking-wide uppercase">
        <li><a href="index.html" class="hover:text-cyan-400 transition text-slate-400">Home</a></li>
        <li><a href="tutorials.html" class="hover:text-cyan-400 transition text-slate-400">Tutorials</a></li>
        <li><a href="challenges.html" class="hover:text-cyan-400 transition text-slate-400">Challenges</a></li>
      </ul>
      
      <div id="auth-links" class="flex items-center space-x-5">
        <a href="login.html" class="text-sm font-bold hover:text-white transition text-slate-400">Login</a>
        <a href="signup.html" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 px-6 py-2.5 rounded-full text-sm font-bold transition">Sign Up</a>
      </div>
    </div>
  </div>
</nav>

<script>
  // Navbar Auth Detector
  function updateNavbar() {
    const authLinks = document.getElementById('auth-links');
    const user = JSON.parse(localStorage.getItem('currentUser'));

    if (user) {
      authLinks.innerHTML = `
        <div class="flex items-center space-x-4">
          <span class="text-slate-500 text-xs font-bold tracking-widest uppercase">Welcome, ${user.name.split(' ')[0]}</span>
          <a href="account.html" class="bg-slate-800 border border-slate-700 hover:border-cyan-500/50 text-white px-5 py-2 rounded-full text-xs font-bold transition flex items-center">
            <i class="fa-solid fa-circle-user mr-2 text-cyan-400"></i> Account
          </a>
        </div>
      `;
    }
  }
  updateNavbar();
</script>

  <main class="max-w-4xl mx-auto py-16 px-6">
    
    <div class="bg-slate-900 border border-slate-800 rounded-[3rem] p-10 mb-10 shadow-2xl relative overflow-hidden">
        <div class="flex flex-col md:flex-row items-center gap-10">
            <div class="relative group">
                <div id="image-display" class="w-32 h-32 rounded-full flex items-center justify-center text-4xl font-black text-white bg-gradient-to-tr from-cyan-500 to-purple-500 overflow-hidden border-4 border-slate-800 shadow-xl">
                    <span id="user-initials">??</span>
                </div>
                <label for="pfp-input" class="absolute bottom-0 right-0 bg-cyan-500 w-10 h-10 rounded-full flex items-center justify-center cursor-pointer border-4 border-slate-900 hover:scale-110 transition group-hover:bg-cyan-400 shadow-lg">
                    <i class="fa-solid fa-camera text-slate-950 text-sm"></i>
                    <input type="file" id="pfp-input" class="hidden" accept="image/*">
                </label>
            </div>

            <div class="text-center md:text-left">
                <h1 id="display-name" class="text-4xl font-extrabold text-white mb-1">Commander</h1>
                <p id="display-email" class="text-slate-500 text-lg">accessing_terminal...</p>
                <div class="flex justify-center md:justify-start gap-3 mt-4">
                    <span class="bg-cyan-500/10 text-cyan-400 text-[10px] font-bold px-3 py-1 rounded-full uppercase border border-cyan-500/20 tracking-widest">Active Pilot</span>
                </div>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 bg-slate-900/50 border border-slate-800 p-8 rounded-[2rem]">
            <h3 class="text-white font-bold mb-6 flex items-center uppercase tracking-widest text-xs">
                <i class="fa-solid fa-sliders mr-3 text-cyan-500"></i> Identity Settings
            </h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase mb-2 ml-1">Change Display Name</label>
                    <input type="text" id="name-input" 
                        class="w-full bg-slate-950 border border-slate-800 rounded-xl py-4 px-6 text-white focus:outline-none focus:border-cyan-500/50 transition"
                        placeholder="Enter new name...">
                </div>
                <button onclick="saveName()" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-black py-3 px-8 rounded-xl transition uppercase text-xs tracking-widest shadow-lg shadow-cyan-500/20">
                    Update Profile
                </button>
            </div>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 p-8 rounded-[2rem] flex flex-col justify-between">
            <div>
                <h3 class="text-white font-bold mb-4 flex items-center uppercase tracking-widest text-xs">
                    <i class="fa-solid fa-power-off mr-3 text-red-500"></i> Terminal
                </h3>
                <p class="text-slate-500 text-xs leading-relaxed">Closing the session will require re-authentication.</p>
            </div>
            <button onclick="logout()" class="mt-6 w-full py-3 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white border border-red-500/20 font-bold rounded-xl transition uppercase text-[10px] tracking-widest">
                Log Out
            </button>
        </div>
    </div>
  </main>

  <script>
    // 1. Initial Load Logic
    function init() {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) {
            window.location.href = 'login.html';
            return;
        }

        // Fill UI
        document.getElementById('display-name').innerText = user.name;
        document.getElementById('display-email').innerText = user.email;
        document.getElementById('name-input').value = user.name;
        
        // Handle Profile Image or Initials
        updateProfileVisuals(user);
    }

    function updateProfileVisuals(user) {
        const display = document.getElementById('image-display');
        if (user.pfp) {
            display.innerHTML = `<img src="${user.pfp}" class="w-full h-full object-cover">`;
        } else {
            const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
            display.innerHTML = `<span id="user-initials">${initials}</span>`;
        }
    }

    // 2. Change Name
    function saveName() {
        const newName = document.getElementById('name-input').value.trim();
        if (!newName) return alert("Name cannot be empty.");

        let user = JSON.parse(localStorage.getItem('currentUser'));
        user.name = newName;

        // Update both LocalStorage keys
        localStorage.setItem('currentUser', JSON.stringify(user));
        localStorage.setItem('codeVector_User', JSON.stringify(user));

        alert("System Updated: Identity Confirmed.");
        location.reload();
    }

    // 3. Handle Profile Picture (Base64)
    document.getElementById('pfp-input').onchange = function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const base64Image = event.target.result;
                
                let user = JSON.parse(localStorage.getItem('currentUser'));
                user.pfp = base64Image;

                localStorage.setItem('currentUser', JSON.stringify(user));
                localStorage.setItem('codeVector_User', JSON.stringify(user));

                updateProfileVisuals(user);
            };
            reader.readAsDataURL(file);
        }
    };

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    }

    init();
  </script>
</body>
</html>
